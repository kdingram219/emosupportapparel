<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700&amp;display=swap');
    </style>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#F8F4EE" stroke="#C6A96B" stroke-width="2"/>

  <!-- Dog tag shape -->
  <rect x="50" y="55" width="100" height="70" rx="8" fill="#2B2B2B" stroke="#C6A96B" stroke-width="1.5"/>

  <!-- Tag hole -->
  <circle cx="100" cy="50" r="8" fill="none" stroke="#C6A96B" stroke-width="2"/>

  <!-- ESA text -->
  <text x="100" y="88" font-family="'Inter', 'Helvetica', sans-serif" font-size="28" font-weight="700"
        fill="#F8F4EE" text-anchor="middle" letter-spacing="5">ESA</text>

  <!-- Small heart on tag -->
  <text x="100" y="110" font-family="'Inter', sans-serif" font-size="10" font-weight="400"
        fill="#A8B5A2" text-anchor="middle" letter-spacing="2">♥ REGISTERED</text>

  <!-- Bottom text -->
  <text x="100" y="158" font-family="'Inter', 'Helvetica', sans-serif" font-size="8" font-weight="600"
        fill="#2B2B2B" text-anchor="middle" letter-spacing="3">EMOTIONAL SUPPORT</text>

  <!-- Stitched decorative border -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#A8B5A2" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
</svg>